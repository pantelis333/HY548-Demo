apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: github-source-demo
  namespace: argocd
  labels:
    demo.repo: HY548-Demo
    demo.source: GitHub
    demo.stage: stage0-demo1-demo2-demo3
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: __REPO_URL__
    targetRevision: __TARGET_REVISION__
    path: k8s/github-source-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: github-source-demo
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 10
