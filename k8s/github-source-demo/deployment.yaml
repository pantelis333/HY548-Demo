apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-source-demo
  labels:
    app.kubernetes.io/name: github-source-demo
    app.kubernetes.io/part-of: argocd-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: github-source-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: github-source-demo
        app.kubernetes.io/part-of: argocd-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: site-content
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: site-content
          configMap:
            name: github-source-demo-content
