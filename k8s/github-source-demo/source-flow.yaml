apiVersion: apps/v1
kind: Deployment
metadata:
  name: repo-webhook
  labels:
    app.kubernetes.io/name: repo-webhook
    app.kubernetes.io/part-of: github-source-demo
    demo.flow: gitops
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: repo-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: repo-webhook
        app.kubernetes.io/part-of: github-source-demo
        demo.flow: gitops
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: repo-webhook
  labels:
    app.kubernetes.io/name: repo-webhook
    app.kubernetes.io/part-of: github-source-demo
    demo.flow: gitops
spec:
  selector:
    app.kubernetes.io/name: repo-webhook
  ports:
    - name: http
      port: 80
      targetPort: http
---
