<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HY548-Demo GitHub Source</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./app-config.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-label="GitHub source status">
        <div class="hero-copy">
          <p id="stage" class="eyebrow">Stage 0</p>
          <h1 id="headline">HY548-Demo on GitHub</h1>
          <p id="message" class="lede">
            This Argo CD application exists only to make the GitHub source visible as its own tile.
          </p>
          <div class="repo-panel">
            <span>Repository</span>
            <strong id="repo">github.com/pantelis333/HY548-Demo</strong>
          </div>
        </div>

        <div class="flow-shell" aria-label="GitOps flow">
          <div id="flow" class="flow"></div>
        </div>
      </section>

      <section class="facts" aria-label="GitOps facts">
        <article>
          <span>Branch</span>
          <strong id="branch">main</strong>
        </article>
        <article>
          <span>Argo app</span>
          <strong id="appName">github-source-demo</strong>
        </article>
        <article>
          <span>What changed</span>
          <strong id="change">baseline</strong>
        </article>
      </section>
    </main>

    <script>
      const config = window.SOURCE_DEMO_CONFIG || {};
      const defaultSteps = [
        { label: "GitHub", value: "HY548-Demo" },
        { label: "Argo CD", value: "Application" },
        { label: "Kubernetes", value: "1 pod" }
      ];
      const setText = (id, value) => {
        if (value) {
          document.getElementById(id).textContent = value;
        }
      };
      const renderFlow = () => {
        const steps = config.steps || defaultSteps;
        const flow = document.getElementById("flow");
        flow.className = `flow ${config.mode || "baseline"}`;
        flow.innerHTML = "";

        steps.forEach((step, index) => {
          const node = document.createElement("article");
          node.className = "flow-node";
          node.innerHTML = `<span>${step.label}</span><strong>${step.value}</strong><small>${step.note || ""}</small>`;
          flow.appendChild(node);

          if (index < steps.length - 1) {
            const arrow = document.createElement("div");
            arrow.className = "flow-arrow";
            flow.appendChild(arrow);
          }
        });
      };

      document.documentElement.style.setProperty("--accent", config.accent || "#22d3ee");
      document.documentElement.style.setProperty("--accent-two", config.accentTwo || "#facc15");
      setText("stage", config.stage);
      setText("headline", config.headline);
      setText("message", config.message);
      setText("repo", config.repo);
      setText("branch", config.branch);
      setText("appName", config.appName);
      setText("change", config.change);
      renderFlow();
    </script>
  </body>
</html>
