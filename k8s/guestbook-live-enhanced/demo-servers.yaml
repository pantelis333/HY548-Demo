apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook-api
  labels:
    app: guestbook-api
    app.kubernetes.io/part-of: guestbook-live
spec:
  replicas: 3
  selector:
    matchLabels:
      app: guestbook-api
  template:
    metadata:
      labels:
        app: guestbook-api
        app.kubernetes.io/part-of: guestbook-live
    spec:
      containers:
        - name: api
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: guestbook-api
  labels:
    app: guestbook-api
    app.kubernetes.io/part-of: guestbook-live
spec:
  selector:
    app: guestbook-api
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook-cache
  labels:
    app: guestbook-cache
    app.kubernetes.io/part-of: guestbook-live
spec:
  replicas: 3
  selector:
    matchLabels:
      app: guestbook-cache
  template:
    metadata:
      labels:
        app: guestbook-cache
        app.kubernetes.io/part-of: guestbook-live
    spec:
      containers:
        - name: cache
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: guestbook-cache
  labels:
    app: guestbook-cache
    app.kubernetes.io/part-of: guestbook-live
spec:
  selector:
    app: guestbook-cache
  ports:
    - port: 80
      targetPort: 80

